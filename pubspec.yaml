publish_to: "none"
version: 0.2.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: any

dev_dependencies:
#  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true

